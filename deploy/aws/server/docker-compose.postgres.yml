services:
  postgres:
    image: postgres:16-alpine
    container_name: pp-indexer-pg
    restart: unless-stopped
    environment:
      POSTGRES_USER: indexer
      POSTGRES_PASSWORD: indexer
      POSTGRES_DB: indexer
    # Bind to localhost only — nginx/services reach it in-host; never exposed.
    ports:
      - "127.0.0.1:5434:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U indexer"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
