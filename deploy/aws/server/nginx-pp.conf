# Single-origin reverse proxy for the wallet backend.
#   /events, /health   -> indexer   (127.0.0.1:8080)
#   /relay             -> relayer   (127.0.0.1:8090)
# The app uses ONE base URL (https://<host>) for both clients.


server {
    listen 80;
    server_name _;

    # Indexer: durable event feed consumed by the wallet's ChainStore sync.
    location /events {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        proxy_read_timeout 30s;
    }

    # Privacy relayer: submits withdraw/transfer as its own account.
    location /relay {
        proxy_pass http://127.0.0.1:8090;
        proxy_set_header Host $host;
        proxy_read_timeout 60s;
    }

    # Health: indexer's /health (relayer also has one at /relay-health if needed).
    location = /health {
        proxy_pass http://127.0.0.1:8080/health;
    }
}
