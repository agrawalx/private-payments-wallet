# Standalone workspace for the Soroban contracts — deliberately separate from
# the vendor Rust workspace: soroban-sdk pins `arbitrary ~1.3` while
# ceremony-cli's cranelift chain needs `^1.4`, and one shared lockfile cannot
# hold both. Contracts are built with `stellar contract build` from here.
[workspace]
members = [
    "asp-membership",
    "asp-non-membership",
    "circom-groth16-verifier",
    "pool",
    "soroban-utils",
    "types",
]
resolver = "2"

[workspace.package]
version = "0.1.0"
edition = "2024"
repository = "https://github.com/NethermindEth/stellar-private-transactions"
license = "Apache-2.0"
publish = false

[workspace.dependencies]
ark-bn254 = { version = "0.6.0", default-features = false, features = ["curve"] }
ark-circom = { git = "https://github.com/NethermindEth/circom-compat.git", default-features = false, branch = "wasm-no-parallel" }
ark-ff = { version = "0.6.0", default-features = false }
ark-groth16 = { version = "0.6.0", default-features = false }
ark-relations = { version = "0.6.0", default-features = false }
ark-std = { version = "0.6.0", default-features = false, features = ["std"] }
asp-membership = { path = "asp-membership" }
asp-non-membership = { path = "asp-non-membership" }
circom-groth16-verifier = { path = "circom-groth16-verifier" }
circuit-keys = { path = "../circuit-keys" }
contract-types = { path = "types" }
num-bigint = { version = "0.4.6", default-features = false, features = ["serde"] }
serde_json = { version = "1", default-features = false }
soroban-sdk = { version = "26", default-features = false, features = ["hazmat"] }
soroban-utils = { path = "soroban-utils" }
zkhash = { path = "../poseidon2" }

[workspace.lints.rust]
missing_docs = "allow"
unsafe_code = "deny"

[workspace.lints.clippy]
arithmetic_side_effects = "deny"
cast_lossless = "deny"
cast_possible_truncation = "deny"
cast_possible_wrap = "deny"
cast_precision_loss = "deny"
cast_sign_loss = "deny"
needless_return = "deny"
panicking_overflow_checks = "deny"
unwrap_used = "deny"

[profile.release]
opt-level = "z"
overflow-checks = true
debug = 0
strip = "symbols"
debug-assertions = false
panic = "abort"
codegen-units = 1
lto = true

[profile.release-with-logs]
inherits = "release"
debug-assertions = true

# Upstream's shim: cranelift-control relaxed to `arbitrary ~1.3` so the
# ark-circom(wasmer) dev-dep tree can coexist with soroban-sdk in one lockfile.
[patch.crates-io]
cranelift-control = { path = "../cranelift-control" }
